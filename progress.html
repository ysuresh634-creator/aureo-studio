<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f4f1ea">
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<title>Project progress · Aureo</title>
<style>
  :root{--ink:#16181D;--cream:#f4f1ea;--gold:#FFCC00;--win:#fffdf7;--muted:#8a857c;--line:#e6e1d6;--ok:#1c7a3d;--blue:#1746c4}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Hanken Grotesk',-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:26px 18px 60px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .brand .dot{width:22px;height:22px;border-radius:50%;background:var(--gold);border:2px solid var(--ink);display:inline-block}
  .card{background:var(--win);border:2px solid var(--ink);border-radius:16px;box-shadow:3px 3px 0 var(--ink);padding:22px;margin-top:20px}
  .ttl{font-size:24px;font-weight:800;line-height:1.15}
  .sub{font-size:13px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .steps{display:flex;flex-direction:column;gap:0;margin-top:24px}
  .step{display:flex;align-items:flex-start;gap:14px;position:relative;padding-bottom:20px}
  .step:not(:last-child):before{content:"";position:absolute;left:15px;top:32px;bottom:0;width:2px;background:var(--line)}
  .step.done:not(:last-child):before,.step.cur:not(:last-child):before{background:var(--ink)}
  .step .dot{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;background:var(--win);flex:none;z-index:1}
  .step.done .dot{background:var(--ink);color:var(--gold)}
  .step.cur .dot{background:var(--gold)}
  .step .lb{font-weight:700;font-size:15px;padding-top:5px}
  .step.cur .lb{color:var(--ink)}
  .step:not(.done):not(.cur) .lb{color:var(--muted)}
  .gate .dot{border-color:var(--ink)}
  h3{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:26px 0 10px}
  .del{padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;font-size:14px}
  .delhead{display:flex;align-items:center;gap:9px}
  .delhead b{flex:1;font-weight:700}
  .watch{display:inline-block;margin-top:11px;background:var(--ink);color:var(--gold);font-weight:800;font-size:13px;text-decoration:none;padding:10px 15px;border-radius:9px}
  .fbbox{margin-top:12px}
  .fbbox textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px;font-family:inherit;font-size:14px;resize:vertical;min-height:54px;box-sizing:border-box}
  .fbbox .actions{margin-top:10px}
  .fbdone{margin-top:11px;font-size:13px;font-weight:700;padding:9px 12px;border-radius:9px}
  .fbdone.approved{background:#e2f6e8;color:var(--ok)}
  .fbdone.changes{background:#fff3d4;color:#8a6300}
  .st{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px}
  .st-approved{background:#e2f6e8;color:var(--ok)} .st-review{background:#fff3d4;color:#8a6300}
  .st-draft,.st-gate{background:#eef1f6;color:#55607a} .st-changes{background:#f4e9e9;color:#a15656}
  .st-scheduled{background:#efe9fb;color:#5b3fb0}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .btn{border:2px solid var(--ink);border-radius:10px;padding:11px 18px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;background:var(--gold);box-shadow:2px 2px 0 var(--ink)}
  .btn.ghost{background:var(--win)}
  .btn:active{transform:translate(2px,2px);box-shadow:none}
  .note{font-size:13px;color:var(--muted);margin-top:22px;line-height:1.6;text-align:center}
  .msg{text-align:center;padding:60px 20px;color:var(--muted)}
  .banner{background:var(--gold);border:2px solid var(--ink);border-radius:10px;padding:12px 14px;font-weight:700;font-size:14px;margin-top:16px}
  /* content calendar + live insights */
  .live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--ok);text-transform:uppercase;letter-spacing:.05em}
  .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(28,122,61,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(28,122,61,.45)}70%{box-shadow:0 0 0 7px rgba(28,122,61,0)}100%{box-shadow:0 0 0 0 rgba(28,122,61,0)}}
  .insrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0 4px}
  .ins{background:var(--cream);border:1.5px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
  .ins b{display:block;font-size:20px;font-weight:800;line-height:1}
  .ins span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:800;margin-top:4px;display:block}
  .platrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .platchip{font-size:11px;font-weight:700;background:var(--cream);border:1.5px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--muted)}
  .cwhen{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}
</style>
</head>
<body>
<div id="app"><div class="msg">Loading your project…</div></div>
<script>
/* Zero dependencies — talks to Firestore over plain REST via fetch(). No SDK, no fonts, ~10KB total. Loads instantly on any device. */
const BASE='https://firestore.googleapis.com/v1/projects/aureo-studio-5aa35/databases/(default)/documents';
const TOK=new URLSearchParams(location.search).get('s');
function uw(v){ if(v==null)return null; if('stringValue'in v)return v.stringValue; if('integerValue'in v)return parseInt(v.integerValue,10); if('doubleValue'in v)return v.doubleValue; if('booleanValue'in v)return v.booleanValue; if('nullValue'in v)return null; if('timestampValue'in v)return v.timestampValue; if('arrayValue'in v)return (v.arrayValue.values||[]).map(uw); if('mapValue'in v){ const o={}, f=v.mapValue.fields||{}; for(const k in f)o[k]=uw(f[k]); return o; } return null; }
function unwrapDoc(d){ const o={}, f=(d&&d.fields)||{}; for(const k in f)o[k]=uw(f[k]); return o; }
function wr(val){ if(val===null||val===undefined)return {nullValue:null}; if(typeof val==='string')return {stringValue:val}; if(typeof val==='boolean')return {booleanValue:val}; if(typeof val==='number')return Number.isInteger(val)?{integerValue:String(val)}:{doubleValue:val}; if(Array.isArray(val))return {arrayValue:{values:val.map(wr)}}; if(typeof val==='object'){ const fields={}; for(const k in val)fields[k]=wr(val[k]); return {mapValue:{fields}}; } return {nullValue:null}; }
const STAGES=['Brief','Production','The Gate','Client Review','Shipped'];
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const app=document.getElementById('app');
function msg(t){ app.innerHTML='<div class="msg">'+esc(t)+'</div>'; }
async function load(){
  if(!TOK){ msg('This link is invalid.'); return; }
  try{
    const r=await fetch(BASE+'/shares/'+encodeURIComponent(TOK),{cache:'no-store'});
    if(r.status===404){ msg('This link is no longer active.'); return; }
    if(!r.ok){ msg('Could not load — please refresh.'); return; }
    render(unwrapDoc(await r.json()));
  }catch(e){ msg('Could not load — check your connection and refresh.'); }
}
const SLBL={draft:'in progress',gate:'in progress',review:'ready for you',approved:'approved',changes:'revising'};
/* ---- content calendar helpers ---- */
function platEmoji(p){ p=(p||'').toLowerCase(); if(p.indexOf('reel')>-1)return '🎬'; if(p.indexOf('story')>-1)return '⚡'; if(p.indexOf('carousel')>-1)return '🖼️'; if(p.indexOf('youtube')>-1)return '▶️'; if(p.indexOf('linkedin')>-1)return '💼'; if(p.indexOf('tiktok')>-1)return '🎵'; if(p.indexOf('facebook')>-1)return '👍'; return '📸'; }
function statClass(s){ s=(s||'').toLowerCase(); if(s==='posted')return 'approved'; if(s==='review')return 'review'; if(s==='scheduled')return 'scheduled'; return 'draft'; }
function prettyD(d){ if(!d)return ''; const x=new Date(d+'T00:00:00'); if(isNaN(x))return d; return x.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'}); }
function contentSection(s){
  const content=(s.content||[]).filter(c=>c&&c.id);
  if(!content.length) return '';
  const fbmap=s.client_action||{};
  const posted=content.filter(c=>c.status==='Posted').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const upcoming=content.filter(c=>c.status!=='Posted').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const reviewed=content.filter(c=>fbmap['content_'+c.id]);
  const approved=reviewed.filter(c=>fbmap['content_'+c.id].action==='approved');
  const rate=reviewed.length?Math.round(approved.length/reviewed.length*100):null;
  const byPlat={}; content.forEach(c=>{ const p=(c.platform||'Other').split(' ')[0]; byPlat[p]=(byPlat[p]||0)+1; });
  const ins=(n,l)=>`<div class="ins"><b>${n}</b><span>${l}</span></div>`;
  const insights=`<div class="insrow">${ins(content.length,'Planned')}${ins(posted.length,'Posted')}${ins(upcoming.length,'Upcoming')}${ins(rate==null?'—':rate+'%','Approved')}</div>`;
  const platBar=Object.keys(byPlat).length?`<div class="platrow">${Object.keys(byPlat).map(p=>`<span class="platchip">${esc(p)} · ${byPlat[p]}</span>`).join('')}</div>`:'';
  const card=(c,allowFb)=>{
    const fb=fbmap['content_'+c.id];
    const link=c.url?`<a class="watch" href="${esc(c.url)}" target="_blank" rel="noopener">▶ View the post</a>`:'';
    let panel='';
    if(fb){ panel=`<div class="fbdone ${fb.action==='approved'?'approved':'changes'}">${fb.action==='approved'?'✓ You approved this':'↺ You asked for changes'}${fb.note?' — “'+esc(fb.note)+'”':''}</div>`; }
    else if(allowFb){ panel=`<div class="fbbox"><textarea id="cf_${esc(c.id)}" placeholder="Love it, or want a tweak? (leave blank to just approve)"></textarea><div class="actions"><button class="btn" onclick="actPost('${esc(c.id)}','approved')">✓ Approve</button><button class="btn ghost" onclick="actPost('${esc(c.id)}','changes')">✏️ Request a change</button></div></div>`; }
    return `<div class="del"><div class="delhead"><span>${esc(platEmoji(c.platform))}</span><b>${esc(c.title||'Post')}</b><span class="st st-${statClass(c.status)}">${esc(c.status||'')}</span></div><div class="cwhen">${esc([c.platform, prettyD(c.date)].filter(Boolean).join(' · '))}</div>${link}${panel}</div>`;
  };
  let out=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><div class="ttl" style="font-size:19px">Your content calendar</div><span class="live"><span class="pulse"></span>Live</span></div><div class="sub">Every post we plan &amp; publish — full transparency</div>${insights}${platBar}`;
  if(upcoming.length){ out+=`<h3>Coming up — review &amp; approve</h3>`+upcoming.map(c=>card(c, c.status==='Review'||c.status==='Scheduled')).join(''); }
  if(posted.length){ out+=`<h3>Already posted</h3>`+posted.map(c=>card(c,false)).join(''); }
  out+=`</div>`;
  return out;
}
function render(s){
  window.__s=s;
  const stage=s.stage||0;
  const steps=STAGES.map((st,i)=>`<div class="step ${i<stage?'done':i===stage?'cur':''} ${st==='The Gate'?'gate':''}"><div class="dot">${i<stage?'✓':i+1}</div><div class="lb">${esc(st)}</div></div>`).join('');
  const fbmap=s.client_action||{};
  const dels=(s.deliverables||[]).length ? s.deliverables.map(d=>{
    const fb=fbmap[d.id];
    const work=d.url?`<a class="watch" href="${esc(d.url)}" target="_blank" rel="noopener">▶ Watch / view the work</a>`:'';
    let panel='';
    if(fb){ panel=`<div class="fbdone ${fb.action}">${fb.action==='approved'?'✓ You approved this':'↺ You asked for changes'}${fb.note?' — “'+esc(fb.note)+'”':''}</div>`; }
    else if(d.status==='review'){ panel=`<div class="fbbox"><textarea id="fb_${esc(d.id)}" placeholder="Anything to change? (leave blank to just approve)"></textarea><div class="actions"><button class="btn" onclick="act('${esc(d.id)}','approved')">✓ Approve</button><button class="btn ghost" onclick="act('${esc(d.id)}','changes')">✏️ Request changes</button></div></div>`; }
    return `<div class="del"><div class="delhead"><span>${esc(d.emoji||'📄')}</span><b>${esc(d.title||'Deliverable')}</b><span class="st st-${esc(d.status||'draft')}">${esc(SLBL[d.status]||d.status||'')}</span></div>${work}${panel}</div>`;
  }).join('') : '<div class="note" style="text-align:left">Your pieces will appear here as work progresses — you’ll watch each one and approve it before we finish.</div>';
  app.innerHTML=`<div class="wrap">
    <div class="brand"><span class="dot"></span>Aureo</div>
    <div class="card">
      <div class="ttl">${esc(s.title||'Your project')}</div>
      <div class="sub">${esc(s.client||'')}${s.type?' · '+esc(s.type):''} · Live progress</div>
      <div class="steps">${steps}</div>
      <h3>Your work — watch &amp; approve each piece</h3>${dels}
    </div>
    ${contentSection(s)}
    <div class="note">Live progress, no login. Watch each edit, leave feedback, approve when you’re happy. Anything else — just reply on WhatsApp. 🟡</div>
  </div>`;
}
window.act=async function(itemId,action){
  const ta=document.getElementById('fb_'+itemId); const note=ta?ta.value.trim():'';
  const cur=(window.__s&&window.__s.client_action)?Object.assign({},window.__s.client_action):{};
  cur[itemId]={action:action,note:note,at:new Date().toISOString()};
  if(window.__s){ window.__s.client_action=cur; render(window.__s); } /* optimistic — instant, no waiting on the network */
  const body={fields:{client_action:wr(cur),updated_at:wr(new Date().toISOString())}};
  const url=BASE+'/shares/'+encodeURIComponent(TOK)+'?updateMask.fieldPaths=client_action&updateMask.fieldPaths=updated_at';
  for(let a=0;a<3;a++){ try{ const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(r.ok) break; }catch(e){} await new Promise(res=>setTimeout(res,600*(a+1))); }
};
window.actPost=async function(id,action){
  const ta=document.getElementById('cf_'+id); const note=ta?ta.value.trim():'';
  const cur=(window.__s&&window.__s.client_action)?Object.assign({},window.__s.client_action):{};
  cur['content_'+id]={action:action,note:note,at:new Date().toISOString()};
  if(window.__s){ window.__s.client_action=cur; render(window.__s); }
  const body={fields:{client_action:wr(cur),updated_at:wr(new Date().toISOString())}};
  const url=BASE+'/shares/'+encodeURIComponent(TOK)+'?updateMask.fieldPaths=client_action&updateMask.fieldPaths=updated_at';
  for(let a=0;a<3;a++){ try{ const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(r.ok) break; }catch(e){} await new Promise(res=>setTimeout(res,600*(a+1))); }
};
load();
/* live: refresh in the background so the dashboard stays current, without disturbing typing */
setInterval(function(){ if(document.hidden) return; const f=document.activeElement; if(f&&f.tagName==='TEXTAREA') return; load(); }, 60000);
</script>
</body>
</html>
