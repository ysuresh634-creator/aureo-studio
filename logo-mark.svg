<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="sketch" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- orbit, back half -->
  <g filter="url(#sketch)">
    <path d="M 14 78 A 52 22 -24 0 1 92 26" fill="none" stroke="#16181D" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- the gold coin -->
  <g filter="url(#sketch)">
    <circle cx="60" cy="60" r="31" fill="#FFCC00"/>
    <circle cx="60" cy="60" r="31" fill="none" stroke="#16181D" stroke-width="5"/>
  </g>
  <!-- orbit, front half -->
  <g filter="url(#sketch)">
    <path d="M 92 26 A 52 22 -24 0 1 14 78" fill="none" stroke="#16181D" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="0.1 14" />
    <path d="M 30 89 A 52 22 -24 0 0 100 42" fill="none" stroke="#16181D" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- the one human on the orbit -->
  <g filter="url(#sketch)">
    <circle cx="98" cy="34" r="8" fill="#16181D"/>
    <circle cx="98" cy="34" r="12" fill="none" stroke="#16181D" stroke-width="2.5"/>
  </g>
  <!-- spark -->
  <g filter="url(#sketch)" stroke="#16181D" stroke-width="3.5" stroke-linecap="round">
    <path d="M 18 22 v 12 M 12 28 h 12"/>
  </g>
</svg>
